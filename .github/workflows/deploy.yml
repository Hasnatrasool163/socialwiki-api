name: Deploy Node.js Backend

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only run on push events OR when PR is merged (not just closed)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    defaults:
      run:
        shell: bash
    
    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Prepare files to upload (exclude node_modules, .git, logs, etc.)
      - name: Prepare files to upload
        run: |
          mkdir -p deploy
          # Copy all files except those in .gitignore
          rsync -av --progress . deploy/ \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=logs \
            --exclude=.env \
            --exclude=.env.local \
            --exclude=.DS_Store \
            --exclude=*.log \
            --exclude=deploy

      # 3️⃣ Upload files to server
      - name: Deploy source code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: deploy/
          target: /home/dev/api.socialwiki.co.uk
          rm: false
          debug: true

      # 4️⃣ Create production .env on server
      - name: Create production .env on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/dev/api.socialwiki.co.uk/deploy
            cat > .env <<EOF
            NODE_ENV=production
            PORT=${{ secrets.PORT }}
            MONGODB_URI=${{ secrets.MONGODB_URI }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            EOF

      # 5️⃣ Install dependencies on server
      - name: Install dependencies on server
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/dev/api.socialwiki.co.uk/deploy
            if [ -f package-lock.json ]; then
              npm ci --production
            else
              npm install --production
            fi

      # 6️⃣ Restart application with PM2 (Industry Standard)
      - name: Restart application with PM2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /home/dev/api.socialwiki.co.uk/deploy
            mkdir -p logs
            
            pm2 delete socialwiki-api || true
            pm2 start ecosystem.config.js --only socialwiki-api --env production

            pm2 save
